  .hidden{display:none!important;}
  @media (prefers-reduced-motion:reduce){.eq span{animation:none; height:60%!important;} .live::before{animation:none;}}

<script>
/* ══════════════ ÉTAT ══════════════ */
let db = null, configured = false;
let selected = null;        // titre Deezer choisi (vue publique)
let requests = [];          // demandes (vue DJ)
let djFilter = "pending";
let djAuthed = false;
let searchTimer = null;
let playingId = null;       // id du preview en cours

const app = document.getElementById("app");
const player = document.getElementById("player");
document.getElementById("brand").firstChild.textContent = CONFIG.nomSoiree;

/* ══════════════ FIREBASE ══════════════ */
try{
  if(CONFIG.firebase.apiKey && !CONFIG.firebase.apiKey.startsWith("COLLE")){
    firebase.initializeApp(CONFIG.firebase);
    db = firebase.firestore();
    configured = true;
  }
}catch(e){ console.warn("Firebase:", e); }

const COL = () => db.collection("requests");
const now = () => firebase.firestore.FieldValue.serverTimestamp();

/* ══════════════ DEEZER (JSONP, sans CORS) ══════════════ */
function deezerSearch(q){
  return new Promise((resolve)=>{
    const cb = "dz_" + Math.random().toString(36).slice(2);
    const s = document.createElement("script");
    let done = false;
    const cleanup = () => { try{ delete window[cb]; }catch(e){} s.remove(); };
    window[cb] = (data) => { done = true; resolve((data && data.data) ? data.data : []); cleanup(); };
    s.onerror = () => { if(!done){ resolve([]); cleanup(); } };
    s.src = "https://api.deezer.com/search?limit=8&output=jsonp&callback=" + cb + "&q=" + encodeURIComponent(q);
    document.body.appendChild(s);
    setTimeout(()=>{ if(!done){ resolve([]); cleanup(); } }, 8000);
  });
}
const esc = (s) => (s||"").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

// Recherche tolérante aux fautes : retente sans accents, puis sur les mots forts.
async function deezerSmartSearch(q){
  q = (q||"").trim();
  if(!q) return [];
  var res = await deezerSearch(q);
  if(res.length) return res;
  // sans accents ni ponctuation
  var norm = q.normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^\w\s]/g, " ").replace(/\s+/g, " ").trim();
  if(norm && norm.toLowerCase() !== q.toLowerCase()){
    res = await deezerSearch(norm);
    if(res.length) return res;
  }
  // sur les mots les plus significatifs (souvent bien orthographiés)
  var words = norm.split(" ").filter(function(w){ return w.length >= 3; });
  if(words.length > 1){
    words.sort(function(a,b){ return b.length - a.length; });
    res = await deezerSearch(words.slice(0,2).join(" "));
    if(res.length) return res;
    res = await deezerSearch(words[0]);
    if(res.length) return res;
  }
  return [];
}

/* ══════════════ AUDIO PREVIEW ══════════════ */
function togglePreview(url, id){
  if(playingId === id){ player.pause(); playingId = null; render(); return; }
  player.src = url; player.play().catch(()=>{}); playingId = id;
  player.onended = () => { playingId = null; render(); };
  render();
}

/* ══════════════ ROUTEUR ══════════════ */
function isDJ(){ return location.hash.replace("#","").toLowerCase() === "dj"; }
window.addEventListener("hashchange", () => { djAuthed = false; render(); });

/* ══════════════ RENDER ══════════════ */
function render(){
  if(isDJ()) renderDJ(); else renderPublic();
}

/* ─────────── VUE PUBLIQUE ─────────── */
let publicState = "form"; // form | sent
let myReqId = null, myReqData = null, myReqSub = null;
function renderPublic(){
  document.getElementById("brandSub").textContent = "demande ta musique";
  if(!configured){ app.innerHTML = configBanner(); return; }

  if(!djOpen){
    app.innerHTML =
      '<div class="done"><div class="em">🔒</div>'+
      '<div class="big">Demandes en pause</div>'+
      '<p class="hint">Le DJ ne prend pas de demandes pour le moment.<br>Reviens dans un instant 🎶</p></div>';
    return;
  }

  if(publicState === "sent"){
    var st = myReqData ? (myReqData.status || "pending") : "pending";
    var rep = myReqData ? (myReqData.reponse || "") : "";
    var gone = (myReqId && myReqData === null);
    var em, title, sub;
    if(gone){ em="🙈"; title="Demande retirée"; sub="Le DJ a retiré ta demande. Tu peux en envoyer une autre."; }
    else if(st==="playing"){ em="🔥"; title="Ça arrive !"; sub="Prépare-toi, le DJ lance ton titre."; }
    else if(st==="done"){ em="✅"; title="C'est passé !"; sub="Ton titre a été joué — merci d'avoir participé&nbsp;!"; }
    else { em="🎶"; title="C'est dans la file !"; sub="Le DJ a reçu ta demande. Garde cette page ouverte pour suivre."; }
    app.innerHTML =
      '<div class="done"><div class="em">'+em+'</div>'+
      '<div class="big">'+title+'</div>'+
      '<p class="hint">'+sub+'</p>'+
      (rep ? '<div class="dj-reply">💬 Le DJ&nbsp;: '+esc(rep)+'</div>' : '')+
      '<button class="btn" style="max-width:240px;margin:18px auto 0" onclick="resetPublic()">Faire une autre demande</button>'+
      tipButton()+
      contactLink()+'</div>';
    return;
  }

  app.innerHTML =
    '<div class="card">'+

/* ─────────── ALERTES (son + vibration + notif + écran allumé) ─────────── */
let alertsOn = false, audioCtx = null, wakeLock = null;

function saveAlerts(v){ try{ localStorage.setItem("dtb_alerts", v ? "1" : "0"); }catch(e){} }
function loadAlerts(){ try{ return localStorage.getItem("dtb_alerts") === "1"; }catch(e){ return false; } }

// Au démarrage : si les alertes étaient activées ET la permission accordée, on réactive tout seul.
function initAlerts(){
  if(loadAlerts() && "Notification" in window && Notification.permission === "granted"){
    alertsOn = true;
    requestWakeLock();
    armAudioUnlock();   // le son se débloque au premier contact avec l'écran
  }
}
// L'audio ne peut démarrer qu'après une interaction : on le débloque au 1er toucher.
function armAudioUnlock(){
  var unlock = function(){
    try{
      if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if(audioCtx.state === "suspended") audioCtx.resume();
    }catch(e){}
  };
  document.addEventListener("pointerdown", unlock, { once: true });
}

async function enableAlerts(){
  try{ audioCtx = new (window.AudioContext || window.webkitAudioContext)();
       if(audioCtx.state === "suspended") await audioCtx.resume(); }catch(e){}
  try{ if("Notification" in window && Notification.permission !== "granted") await Notification.requestPermission(); }catch(e){}
  await requestWakeLock();
  alertsOn = true;
  saveAlerts(true);
  playBeep();               // bip de confirmation
  renderDJ();
}
function disableAlerts(){ alertsOn = false; saveAlerts(false); releaseWakeLock(); renderDJ(); }

async function requestWakeLock(){
  try{ if("wakeLock" in navigator){ wakeLock = await navigator.wakeLock.request("screen"); } }catch(e){}
}
function releaseWakeLock(){ try{ if(wakeLock){ wakeLock.release(); wakeLock = null; } }catch(e){} }
document.addEventListener("visibilitychange", ()=>{
  if(alertsOn && !wakeLock && document.visibilityState === "visible") requestWakeLock();
});

function playBeep(){
  if(!audioCtx) return;
  try{
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination); o.type = "sine";
    o.frequency.setValueAtTime(880, audioCtx.currentTime);
    o.frequency.setValueAtTime(1320, audioCtx.currentTime + 0.13);
    g.gain.setValueAtTime(0.0001, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.45, audioCtx.currentTime + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.45);
    o.start(); o.stop(audioCtx.currentTime + 0.45);
  }catch(e){}
}

function notifyNew(r){
  if(!alertsOn) return;
  playBeep();
  try{ if(navigator.vibrate) navigator.vibrate([130,70,130]); }catch(e){}
  if(!("Notification" in window) || Notification.permission !== "granted") return;
  var title = "🎵 Nouvelle demande";
  var opts = {
    body: (r.title||"") + (r.artist ? " — "+r.artist : "") + (r.name ? "  ·  "+r.name : ""),
    icon: r.cover || "icon-192.png",
    badge: "icon-192.png",
    tag: "dtb-req",
    renotify: true,
    vibrate: [130,70,130]
  };
  // Android : la notif DOIT passer par le service worker. Repli desktop sur le constructeur.
  if(navigator.serviceWorker && navigator.serviceWorker.ready){
    navigator.serviceWorker.ready
      .then(function(reg){ return reg.showNotification(title, opts); })
      .catch(function(){ try{ new Notification(title, opts); }catch(e){} });
  } else {
    try{ new Notification(title, opts); }catch(e){}
  }
}

/* ─────────── "ET APRÈS ?" — suggestions d'enchaînement ─────────── */
function deezerJSONP(url){
  return new Promise(function(resolve){
    var cb = "dz_" + Math.random().toString(36).slice(2);
    var s = document.createElement("script");
    var done = false;
    var cleanup = function(){ try{ delete window[cb]; }catch(e){} s.remove(); };
    window[cb] = function(data){ done = true; resolve(data || null); cleanup(); };
    s.onerror = function(){ if(!done){ resolve(null); cleanup(); } };
    s.src = url + (url.indexOf("?") >= 0 ? "&" : "?") + "output=jsonp&callback=" + cb;
    document.body.appendChild(s);
    setTimeout(function(){ if(!done){ resolve(null); cleanup(); } }, 8000);
  });
}
async function getSuggestions(r){
  var artistId = null;
  var trackId = null;
  if(r.link){ var m = String(r.link).match(/track\/(\d+)/); if(m) trackId = m[1]; }
  if(trackId){
    var tk = await deezerJSONP("https://api.deezer.com/track/" + trackId);
    if(tk && tk.artist) artistId = tk.artist.id;
  }
  if(!artistId && r.artist){
    var sa = await deezerJSONP("https://api.deezer.com/search/artist?limit=1&q=" + encodeURIComponent(r.artist));
    if(sa && sa.data && sa.data[0]) artistId = sa.data[0].id;
  }
  if(!artistId) return [];
  var radio = await deezerJSONP("https://api.deezer.com/artist/" + artistId + "/radio?limit=25");
  var list = (radio && radio.data) ? radio.data : [];
  var seen = {}, res = [];
  list.forEach(function(t){
    if(!t || !t.title || !t.album || !t.artist) return;
    var key = (t.title + "|" + (t.artist.name||"")).toLowerCase();
    if(seen[key]) return; seen[key] = 1;
    if((t.title||"").toLowerCase() === (r.title||"").toLowerCase()) return;
    res.push(slim(t));
  });
  return res.slice(0, 12);
}
var sugPick = [], sugResults = [], sugEnergie = "monter", sugChosen = null;
function suggestNextFlow(){
  sugChosen = null; sugEnergie = "monter";
  var ov = document.createElement("div"); ov.className = "overlay";
  ov.onclick = function(e){ if(e.target === ov) ov.remove(); };
  ov.innerHTML =
    '<div class="modal" style="max-width:440px"><h3>🎚️ Et après ?</h3>'+
    '<p class="hint" style="margin:-6px 0 10px">Quel titre viens-tu de passer&nbsp;?</p>'+
    '<input id="sugSearch" placeholder="Titre ou artiste…" autocomplete="off">'+
    '<div class="tabs" id="sugEnergie" style="margin-top:12px">'+
      '<span class="pill on" data-energie="monter">🔥 Faire monter</span>'+
      '<span class="pill" data-energie="garder">➡️ Garder</span>'+
      '<span class="pill" data-energie="calmer">🌙 Calmer</span>'+
    '</div>'+
    '<div id="sugList" style="margin-top:12px; text-align:left"></div>'+
    '<button class="btn ghost" style="margin-top:12px" onclick="this.closest(\'.overlay\').remove()">Fermer</button></div>';
  document.body.appendChild(ov);
  var inp = document.getElementById("sugSearch"), t = null;
  inp.addEventListener("input", function(){
    clearTimeout(t);
    var v = inp.value.trim(), box = document.getElementById("sugList");
    if(v.length < 2){ box.innerHTML = ""; return; }
    box.innerHTML = '<p class="hint">Recherche…</p>';
    t = setTimeout(function(){
      deezerSmartSearch(v).then(function(res){
        var box2 = document.getElementById("sugList");
        if(!box2) return;
        if(!res.length){ box2.innerHTML = '<p class="hint">Rien trouvé.</p>'; return; }
        sugPick = res.map(slim);
        box2.innerHTML = sugPick.slice(0,6).map(function(x,i){
          return '<div class="track" data-sugpick="'+i+'"><img class="cover" src="'+esc(x.cover)+'"><div class="tk-info"><div class="tk-title">'+esc(x.title)+'</div><div class="tk-artist">'+esc(x.artist)+'</div></div><span style="color:var(--muted);padding:0 8px">›</span></div>';
        }).join("");
      });
    }, 320);
  });
  ov.addEventListener("click", function(e){
    var en = e.target.closest("[data-energie]");
    if(en){
      sugEnergie = en.getAttribute("data-energie");
      var pills = ov.querySelectorAll("[data-energie]");
      for(var i=0;i<pills.length;i++) pills[i].classList.toggle("on", pills[i]===en);
      if(sugChosen) showSuggestionsFor(sugChosen);
      return;
    }
    var pk = e.target.closest("[data-sugpick]");
    if(pk){ var c = sugPick[+pk.getAttribute("data-sugpick")]; if(c){ sugChosen = c; showSuggestionsFor(c); } return; }
    var pl = e.target.closest("[data-sug-play]");
    if(pl){ var tt = sugResults[+pl.getAttribute("data-sug-play")]; if(tt && tt.preview) togglePreview(tt.preview, "sug"); return; }
    var ad = e.target.closest("[data-sug-add]");
    if(ad){ var a2 = sugResults[+ad.getAttribute("data-sug-add")]; if(a2){ addSuggestion(a2); ad.textContent = "✓"; } }
  });
  setTimeout(function(){ inp.focus(); }, 60);
}
function showSuggestionsFor(chosen){
  sugChosen = chosen;
  var box = document.getElementById("sugList"), search = document.getElementById("sugSearch");
  if(search) search.value = chosen.title;
  box.innerHTML = '<p class="hint">🎚️ L\'IA prépare ton enchaînement…</p>';
  aiText(chosen).then(function(txt){
    var box2 = document.getElementById("sugList");
    if(!box2) return;
    if(txt){
      box2.innerHTML = '<div class="sug-rich">'+ mdToHtml(txt) +'</div>';
      return;
    }
    // repli : suggestions Deezer en cartes cliquables
    getSuggestions(chosen).then(function(list){
      var b3 = document.getElementById("sugList");
      if(!b3) return;
      if(!list.length){ b3.innerHTML = '<p class="hint">Pas d\'idée trouvée pour ce titre 🤔</p>'; return; }
      sugResults = list;
      b3.innerHTML =
        '<p class="hint" style="text-align:left;margin:4px 2px 10px">Après « '+esc(chosen.title)+' » :</p>'+
        list.map(function(x,i){
          return '<div class="track"><img class="cover" src="'+esc(x.cover)+'"><div class="tk-info"><div class="tk-title">'+esc(x.title)+'</div><div class="tk-artist">'+esc(x.artist)+'</div></div>'+
            (x.preview ? '<button class="play" data-sug-play="'+i+'">▶</button>' : '')+
            '<button class="play" data-sug-add="'+i+'" title="Ajouter à la file">➕</button></div>';
        }).join("");
    });
  });
}
// Mini-formateur : transforme le texte de Gemini (gras + puces) en HTML lisible.
function mdToHtml(t){
  var lines = esc(t).split(/\r?\n/);
  var html = "", inList = false;
  function closeList(){ if(inList){ html += "</div>"; inList = false; } }
  lines.forEach(function(l){
    l = l.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>").replace(/^#+\s*/, "");
    var trimmed = l.trim();
    if(!trimmed){ closeList(); return; }
    if(/^[-*•]\s+/.test(trimmed)){
      if(!inList){ html += '<div class="sug-list">'; inList = true; }
      html += '<div class="sug-item">• '+ trimmed.replace(/^[-*•]\s+/, "") +'</div>';
    } else {
      closeList();
      if(/:$/.test(trimmed) || /^\s*<strong>/.test(l) || /^\d+[.)]/.test(trimmed)){
        html += '<div class="sug-h">'+ trimmed +'</div>';
      } else {
        html += '<p class="sug-p">'+ trimmed +'</p>';
      }
    }
  });
  closeList();
  return html;
}
// Appelle Gemini via la fonction Netlify. Renvoie le texte, ou "" si indisponible.
async function aiText(chosen){
  try{
    var r = await fetch("/api/suggest", {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ track: chosen.title, artist: chosen.artist, ambiance: CONFIG.ambiance || "soirée dansante", energie: sugEnergie })
    });
    if(r.ok){ var data = await r.json(); if(data && data.text) return data.text; }
  }catch(e){ console.error("ai:", e); }
  return "";
}
function addSuggestion(t){
  COL().add({
    title: t.title||"", artist: t.artist||"", cover: t.cover||"", link: t.link||"", preview: t.preview||"",
    name: "🎚️ Idée DJ", message: "", status: "pending", createdAt: now()
  }).catch(function(e){ console.error(e); });
}

/* ─────────── CONTACT DJ ─────────── */
function telIntl(){
  var t = (CONFIG.contact.tel || "").replace(/\D/g, "");
  if(t.charAt(0) === "0") t = "33" + t.slice(1);
  return "+" + t;
}
function telDisplay(){
  var t = (CONFIG.contact.tel || "").replace(/\D/g, "");
  return t.replace(/(\d{2})(?=\d)/g, "$1 ").trim();
}
function showContact(){
  var C = CONFIG.contact;
  var intl = telIntl(), wa = intl.replace("+", "");
  var ov = document.createElement("div");
  ov.className = "overlay";
  ov.onclick = function(e){ if(e.target === ov) ov.remove(); };
  ov.innerHTML =
    '<div class="modal contact">'+
      '<div class="eq" aria-hidden="true" style="justify-content:center;margin-bottom:14px"><span></span><span></span><span></span><span></span><span></span></div>'+
      '<div class="c-name">'+esc(C.nom)+'</div>'+
      '<div class="c-sub">'+esc(C.services)+'</div>'+
      '<a class="c-tel" href="tel:'+intl+'">'+telDisplay()+'</a>'+
      '<div class="c-actions">'+
        '<a class="c-btn" href="tel:'+intl+'">📞 Appeler</a>'+
        '<a class="c-btn" href="sms:'+intl+'">💬 SMS</a>'+
        (C.whatsapp ? '<a class="c-btn" href="https://wa.me/'+wa+'" target="_blank" rel="noopener">🟢 WhatsApp</a>' : '')+
      '</div>'+
      '<div class="c-serv">🎧 DJ &amp; animation&nbsp;· 🔊 Sono&nbsp;· 💡 Lumière&nbsp;· 📦 Location</div>'+
      tipButton()+
      '<button class="btn" style="margin-top:14px" onclick="saveVCard()">➕ Enregistrer le contact</button>'+
      '<button class="btn ghost" style="margin-top:8px" onclick="this.closest(\'.overlay\').remove()">Fermer</button>'+
    '</div>';
  document.body.appendChild(ov);
}
function saveVCard(){
  var C = CONFIG.contact;
  var v = "BEGIN:VCARD\nVERSION:3.0\nFN:"+C.nom+"\nORG:"+C.nom+" - "+C.services+"\nTEL;TYPE=CELL:"+telIntl()+"\nEND:VCARD";
  try{
    var blob = new Blob([v], { type: "text/vcard" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url; a.download = (C.nom.replace(/\s+/g, "-") || "contact") + ".vcf";
    document.body.appendChild(a); a.click();
    setTimeout(function(){ URL.revokeObjectURL(url); a.remove(); }, 1000);
  }catch(e){ console.error(e); }
}

/* ══════════════ CLICS (délégation robuste, survit aux rafraîchissements) ══════════════ */
app.addEventListener("click", function(e){
  var el = e.target.closest("[data-act]");
  if(!el) return;
  var a = el.getAttribute("data-act");
  if(a==="alerts"){ alertsOn ? disableAlerts() : enableAlerts(); }
  else if(a==="qr"){ showQR(); }
  else if(a==="filter"){ setFilter(el.getAttribute("data-val")); }
  else if(a==="toggleopen"){ toggleOpen(); }
  else if(a==="clear"){ clearAll(); }
  else if(a==="contact"){ showContact(); }
  else if(a==="rename"){ renameSoiree(); }
  else if(a==="reply"){ replyTo(el.getAttribute("data-id")); }
  else if(a==="next"){ suggestNextFlow(); }
  else if(a==="preview"){ togglePreview(el.getAttribute("data-url"), el.getAttribute("data-id")); }
  else if(a==="status"){ setStatus(el.getAttribute("data-id"), el.getAttribute("data-val")); }
  else if(a==="remove"){ removeReq(el.getAttribute("data-id")); }
});
